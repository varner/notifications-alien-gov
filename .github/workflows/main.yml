name: Check site and update RSS

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check website status
        id: check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://your-site.com)
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Update RSS feed if site is up
        env:
          STATUS_CODE: ${{ steps.check.outputs.status }}
        run: |
          python3 update_rss.py
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "RSS: site check passed at $(date -u)"
          git push
